project:
  type: website
  render:
    - "*.qmd"
  resources:
    - interactive/

website:
  title: "SISMID: Nowcasting"
  site-url: https://nfidd.github.io/sismid-nowcasting/
  repo-url: https://github.com/nfidd/sismid-nowcasting
  repo-actions: [source, issue]
  description: "Nowcasting infectious disease dynamics - SISMID"
  body-footer: '<script data-goatcounter="https://nfidd.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>'
  open-graph: true
  favicon: nfidd-favicon.png
  search:
    location: navbar
    type: textbox
  navbar:
    left:
      - getting-started.qmd
      - text: "Timetable"
        href: timetable.qmd
      - sidebar:sessions
      - sidebar:reference
      - authors.qmd
    right:
      - icon: github
        href: https://github.com/nfidd/sismid-nowcasting
  sidebar:
    - id: reference
      title: "Reference"
      style: "docked"
      contents: "reference/*.qmd"
    - id: sessions
      title: "Sessions"
      style: "docked"
      contents:
        - sessions/introduction-and-course-overview.qmd
        - sessions/delay-distributions.qmd
        - sessions/biases-in-delay-distributions.qmd
        - sessions/using-delay-distributions-to-model-the-data-generating-process-of-an-epidemic.qmd
        - sessions/R-estimation-and-the-renewal-equation.qmd
        - sessions/nowcasting.qmd
        - sessions/joint-nowcasting.qmd
        - sessions/forecasting-nowcasting.qmd
        - sessions/multiple-data-sources.qmd
        - sessions/complex-reporting-processes.qmd
        - sessions/methods-in-the-real-world.qmd
        - sessions/end-of-course-summary-and-discussion.qmd

execute:
  freeze: auto

format:
  html:
    theme:
      light: cosmo
      dark: solar
    css: styles.css
    link-external-icon: true
    link-external-newwindow: true
    toc: true
